<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#E7E5E0" />

<link rel="manifest" href="manifest.json" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #E7E5E0;
    --card: #FBFAF8;
    --ink: #2F3033;
    --muted: #7C7F85;
    --green: #6AA84F;
    --green-d: #588B41;
    --orange: #D9744F;
    --blue: #4F86D9;
    --line: rgba(0,0,0,.07);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
  body { padding-bottom: calc(78px + env(safe-area-inset-bottom)); }
  html.dark { --bg:#14130F; --card:#1F1E1B; --ink:#E9E9EC; --muted:#9A9DA3; --line:rgba(255,255,255,.09); }

  #app { max-width: 560px; margin: 0 auto; padding: 14px 14px 0; }
  h1 { font-size: 20px; font-weight: 800; margin: 8px 2px 2px; }
  h2 { font-size: 16px; font-weight: 800; margin: 18px 2px 8px; }
  .sub { color: var(--muted); font-size: 13px; margin: 0 2px 12px; }

  .card { background: var(--card); border-radius: 16px; padding: 16px; margin: 10px 0;
    box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .row { display: flex; align-items: center; gap: 10px; }
  .between { justify-content: space-between; }
  .grow { flex: 1; }
  .muted { color: var(--muted); }
  .sm { font-size: 13px; }
  .xs { font-size: 11px; }
  .b { font-weight: 700; }
  .center { text-align: center; }

  label { display: block; font-size: 13px; font-weight: 600; margin: 12px 2px 5px; color: var(--ink); }
  input, select {
    width: 100%; padding: 12px 13px; border: 1px solid var(--line); border-radius: 11px;
    background: var(--bg); color: var(--ink); font-size: 15px; font-family: inherit;
  }
  input:focus, select:focus { outline: 2px solid var(--green); border-color: transparent; }
  .field2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  button { font-family: inherit; cursor: pointer; border: none; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700;
    background: var(--green); color: #fff; transition: transform .1s, opacity .15s; }
  .btn:active { transform: scale(.97); }
  .btn.sec { background: var(--bg); color: var(--ink); border: 1px solid var(--line); }
  .btn.ghost { background: transparent; color: var(--green); }
  .btn.danger { background: transparent; color: var(--orange); border: 1px solid var(--line); }
  .btn[disabled] { opacity: .5; pointer-events: none; }
  .chip { padding: 8px 14px; border-radius: 999px; background: var(--bg); border: 1px solid var(--line);
    font-size: 14px; font-weight: 600; color: var(--ink); }
  .chip.on { background: var(--green); color: #fff; border-color: var(--green); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }

  /* Ring */
  .ring-wrap { position: relative; width: 180px; height: 180px; margin: 6px auto 4px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--line); stroke-width: 16; }
  .ring-fg { fill: none; stroke: var(--green); stroke-width: 16; stroke-linecap: round;
    transition: stroke-dashoffset .5s ease; }
  .ring-fg.over { stroke: var(--orange); }
  .ring-mid { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; }
  .ring-mid b { font-size: 38px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
  .ring-mid span { font-size: 12px; color: var(--muted); margin-top: 5px; }

  .macros { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 6px; }
  .macro { background: var(--bg); border-radius: 12px; padding: 10px; text-align: center; }
  .macro b { font-size: 17px; font-weight: 800; }
  .macro .bar { height: 5px; border-radius: 3px; background: var(--line); margin: 7px 0 4px; overflow: hidden; }
  .macro .bar i { display: block; height: 100%; border-radius: 3px; }

  .item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--line); }
  .item:last-child { border-bottom: none; }
  .item .em { font-size: 22px; width: 30px; text-align: center; }
  .item .nm { font-weight: 700; font-size: 14px; }
  .item .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .item .kc { font-weight: 800; white-space: nowrap; }
  .item .x { color: var(--muted); font-size: 20px; padding: 4px 6px; background: none; }

  .seg { display: flex; background: var(--bg); border-radius: 12px; padding: 4px; gap: 4px; margin: 6px 0 4px; }
  .seg button { flex: 1; padding: 10px; border-radius: 9px; font-size: 14px; font-weight: 700;
    background: transparent; color: var(--muted); }
  .seg button.on { background: var(--card); color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

  .empty { text-align: center; color: var(--muted); padding: 30px 12px; font-size: 14px; }
  .pill { display:inline-block; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .pill.high { background: rgba(106,168,79,.16); color: var(--green-d); }
  .pill.medium { background: rgba(217,134,79,.16); color: var(--orange); }
  .pill.low { background: rgba(124,127,133,.18); color: var(--muted); }

  /* bottom nav */
  nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: color-mix(in srgb, var(--card) 86%, transparent);
    -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
    border-top: 1px solid var(--line); padding-bottom: env(safe-area-inset-bottom); }
  nav .inner { max-width: 560px; margin: 0 auto; display: flex; padding: 7px 6px; }
  nav button { flex: 1; background: none; display: flex; flex-direction: column; align-items: center;

  nav button span { font-size: 11px; font-weight: 700; }

  nav .fabwrap { flex: 1; display: flex; justify-content: center; }
  nav .fab-b { width: 54px; height: 54px; border-radius: 50%; background: var(--green); color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 28px; margin-top: -22px;

  /* sheet / modal */
  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 80; display: none;

  .scrim.open { display: flex; animation: fade .2s; }
  @keyframes fade { from { opacity: 0; } }
  .sheet { background: var(--bg); width: 100%; max-width: 560px; border-radius: 22px 22px 0 0;

  .handle { width: 40px; height: 4px; background: var(--line); border-radius: 3px; margin: 8px auto 12px; }

  .toast { position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--bg); padding: 11px 18px; border-radius: 12px; font-size: 14px;

/* ---------- Cloud sync (Supabase) ---------- */
let _sb=null, _sbUser=null, _pushT=null, _pullDone=false, _syncMsg="";
function sbClient(){
  if(_sb) return _sb;
  if(!window.supabase || !SUPA_URL || !SUPA_KEY) return null;
  try { _sb = window.supabase.createClient(SUPA_URL, SUPA_KEY, {auth:{persistSession:true, autoRefreshToken:true, detectSessionInUrl:true}}); }
  catch(e){ return null; }
  return _sb;
}
function cloudInit(){
  const sb=sbClient();
  if(!sb){ setTimeout(cloudInit, 400); return; }   // library not loaded yet — retry
  sb.auth.getSession().then(({data})=>{
    if(data && data.session){ _sbUser=data.session.user; cloudPull(); }
  }).catch(()=>{});
  try { sb.auth.onAuthStateChange((_e,sess)=>{ _sbUser = sess? sess.user : null; if(S.tab==="settings") render(); }); } catch(e){}
}
// Union-merge two full states so nothing additive is ever lost; newest side wins on scalars.
function mergeData(local, cloud){
  if(!cloud) return local; if(!local) return cloud;
  const ln=local.updatedAt||0, cn=cloud.updatedAt||0, newer = cn>ln ? cloud : local;
  const m={ profile: newer.profile||local.profile||cloud.profile||null,
            targets: newer.targets||local.targets||cloud.targets||null,
            settings: Object.assign({}, cloud.settings, local.settings, newer.settings),
            barcodes: Object.assign({}, local.barcodes, cloud.barcodes),
            log:{}, water:{}, weights:[], recents:{}, updatedAt: Math.max(ln,cn) };
  const dates=new Set([...Object.keys(local.log||{}),...Object.keys(cloud.log||{})]);
  dates.forEach(d=>{ const seen=new Set(), arr=[];
    [...((local.log||{})[d]||[]),...((cloud.log||{})[d]||[])].forEach(it=>{
      const k=it.id||(it.name+'|'+it.time); if(seen.has(k))return; seen.add(k); arr.push(it); });
    arr.sort((x,y)=>(x.time||0)-(y.time||0)); m.log[d]=arr; });
  const wd=new Set([...Object.keys(local.water||{}),...Object.keys(cloud.water||{})]);
  wd.forEach(d=>{ m.water[d]=Math.max((local.water||{})[d]||0,(cloud.water||{})[d]||0); });
  const wmap={}; const older = newer===cloud?local:cloud;
  (older.weights||[]).forEach(w=>wmap[w.date]=w.kg);
  (newer.weights||[]).forEach(w=>wmap[w.date]=w.kg);
  m.weights=Object.keys(wmap).sort().map(d=>({date:d,kg:wmap[d]}));
  const rk=new Set([...Object.keys(local.recents||{}),...Object.keys(cloud.recents||{})]);
  rk.forEach(n=>{ const a=(local.recents||{})[n], b=(cloud.recents||{})[n];
    m.recents[n] = (a&&b) ? {...a,...b, count:Math.max(a.count||0,b.count||0), last:Math.max(a.last||0,b.last||0), pin:!!(a.pin||b.pin)} : (a||b); });
  return m;
}
async function cloudPull(){
  const sb=sbClient(); if(!sb||!_sbUser) return;
  fetchBridgeKey();   // load the AI bridge key for this logged-in user
  _syncMsg="מסנכרן..."; if(S.tab==="settings") render();
  try{
    const { data, error } = await sb.from('user_data').select('data').eq('user_id',_sbUser.id).maybeSingle();
    if(error) throw error;
    if(data && data.data){
      const tab=S.tab, vd=S.viewDate;
      S = mergeData(S, data.data); S.tab=tab; S.viewDate=vd;
      if(S.profile) S.targets=computeTargets(S.profile);
      localStorage.setItem(KEY, JSON.stringify(S));
    }
    _pullDone=true; render();
    cloudPushNow();                          // write the merged union back to the cloud
  }catch(e){ _pullDone=true; _syncMsg="שגיאת סנכרון: "+(e.message||e); if(S.tab==="settings") render(); }
}
function schedulePush(){ if(!_sbUser||!_pullDone) return; clearTimeout(_pushT); _pushT=setTimeout(cloudPushNow, 2500); }
async function cloudPushNow(){
  const sb=sbClient(); if(!sb||!_sbUser) return;
  const payload={...S}; delete payload.tab; delete payload.viewDate;
  try{
    const { error } = await sb.from('user_data').upsert({ user_id:_sbUser.id, data:payload, updated_at:new Date().toISOString() });
    if(error) throw error;
    _syncMsg="סונכרן ✓ "+new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  }catch(e){ _syncMsg="שגיאת סנכרון: "+(e.message||e); }
  if(S.tab==="settings") render();
}
async function cloudSignIn(){

  _sbUser=data.user; _syncMsg="מחובר ✓"; cloudPull();

async function cloudSignUp(){
  const sb=sbClient(); if(!sb){ toast("טוען ספריית סנכרון, נסה שוב בעוד רגע"); return; }

  if(data.user && !data.session){ _syncMsg="נשלח אליך מייל אימות — אשר אותו ואז התחבר."; render(); return; }
  _sbUser=data.user; _syncMsg="חשבון נוצר ✓"; cloudPull();
}
async function cloudSignOut(){
  const sb=sbClient(); if(!sb) return;
  try{ await sb.auth.signOut(); }catch(e){}
  _sbUser=null; _pullDone=false; _syncMsg=""; render();

function cloudCard(){

    <p class="xs muted" style="margin-top:8px">אותו אימייל בכמה מכשירים = אותם נתונים מסונכרנים. אימייל אחר = מאגר נפרד ופרטי.</p>
  </div>`;
}

/* ============================ Nutrition math ============================ */
// Mifflin-St Jeor
function bmr(p){
  const base = 10*p.weight + 6.25*p.height - 5*p.age;
  return Math.round(p.gender==="m" ? base+5 : base-161);
}
const ACT = { sed:1.2, light:1.375, mod:1.55, high:1.725, athlete:1.9 };
function tdee(p){ return Math.round(bmr(p) * (ACT[p.activity]||1.2)); }
// Direction of the goal, inferred from target vs current weight.
function goalDir(p){
  const gw=+p.goalWeight, w=+p.weight;
  if(!gw || Math.abs(gw-w)<0.1) return "maintain";
  return gw > w ? "gain" : "lose";
}
function computeTargets(p){
  const t = tdee(p);
  const dir = goalDir(p);
  const adj = Math.round((p.rate||0.5) * 7700 / 7); // kcal/day for kg/week
  let cal = dir==="gain" ? t + adj : dir==="lose" ? t - adj : t; // surplus / deficit / maintenance
  if(dir!=="gain") cal = Math.max(cal, p.gender==="m" ? 1500 : 1200); // safety floor (deficit only)
  // protein ~1.8g per kg, fat 27% of cal, rest carbs
  const prot = Math.round(p.weight * 1.8);
  const fat = Math.round(cal * 0.27 / 9);
  const carbs = Math.max(0, Math.round((cal - prot*4 - fat*9)/4));
  const water = Math.round(p.weight*35/250)*250; // ~35ml/kg, rounded to cups
  return { cal: Math.round(cal), p: prot, c: carbs, f: fat, tdee: t, water, dir };
}
function bmi(p){ const m=p.height/100; return +(p.weight/(m*m)).toFixed(1); }
function bmiCat(v){ return v<18.5?"תת־משקל":v<25?"תקין":v<30?"עודף משקל":"השמנה"; }

/* ============================ helpers ============================ */
function todayItems(d){ return S.log[d || S.viewDate] || []; }
function sumDay(d){
  const arr = todayItems(d); const t={cal:0,p:0,c:0,f:0};
  arr.forEach(i=>{ t.cal+=i.calories||0; t.p+=i.protein||0; t.c+=i.carbs||0; t.f+=i.fat||0; });
  Object.keys(t).forEach(k=>t[k]=Math.round(t[k]));
  return t;
}
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1900);
}
/* water */
function waterToday(){ return S.water[S.viewDate]||0; }
function addWater(ml){ S.water[S.viewDate]=Math.max(0,(S.water[S.viewDate]||0)+ml); save(); render(); }
function fmtDate(iso){
  const d=new Date(iso+"T00:00:00"); const t=todayISO();
  if(iso===t) return "היום";
  const y=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(iso===y) return "אתמול";
  return d.toLocaleDateString("he-IL",{weekday:"short",day:"numeric",month:"numeric"});
}

/* ============================ Render ============================ */
const app = () => document.getElementById("app");
function render(){
  document.documentElement.classList.toggle("dark", !!S.settings.dark);
  if(!S.profile){ renderOnboard(); renderNav(); return; }
  ({home:renderHome, weight:renderWeight, history:renderHistory, settings:renderSettings}[S.tab]||renderHome)();
  renderNav();
}

function renderNav(){
  if(!S.profile){ document.getElementById("nav").innerHTML=""; return; }
  const tab=(id,ic,label)=>`<button class="${S.tab===id?'on':''}" onclick="go('${id}')"><span class="ic">${ic}</span><span>${label}</span></button>`;
  document.getElementById("nav").innerHTML =
    tab("home","🏠","היום") + tab("weight","⚖️","משקל") +
    `<div class="fabwrap"><button class="fab-b" onclick="openAdd()">＋</button></div>` +
    tab("history","📅","יומן") + tab("settings","⚙️","הגדרות");
}
function go(t){ S.tab=t; S.viewDate=todayISO(); save(); render(); window.scrollTo(0,0); }

function ob(k,v){ window._ob[k]=v; renderOnboard(); }
function finishOnboard(){
  const p=window._ob;
  if(!p.age||!p.height||!p.weight){ toast("נא למלא גיל, גובה ומשקל"); return; }
  S.profile=p; S.targets=computeTargets(p);
  if(!S.weights.length) S.weights.push({date:todayISO(), kg:p.weight});
  save(); render();
}

let _bcStream=null, _bcRAF=null, _zxReader=null;
function loadZXing(){

async function startScanner(){
  stopScanner();
  const st=()=>document.getElementById("bcstatus");
  // Path 1: native BarcodeDetector (Android Chrome etc.)
  if("BarcodeDetector" in window){
    try {
      const det=new window.BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128"]});
      _bcStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
      const v=document.getElementById("bcvid"); if(!v){ stopScanner(); return; }
      v.srcObject=_bcStream; await v.play();
      if(st()) st().textContent="כוון את המצלמה אל הברקוד...";
      const tick=async()=>{
        const vid=document.getElementById("bcvid");
        if(!vid||!_bcStream){ stopScanner(); return; }
        try { const codes=await det.detect(vid); if(codes&&codes.length){ stopScanner(); lookupBarcode(codes[0].rawValue); return; } } catch(_){}
        _bcRAF=requestAnimationFrame(tick);
      };
      _bcRAF=requestAnimationFrame(tick);
      return;
    } catch(e){ /* fall through to ZXing */ stopScanner(); }
  }
  // Path 2: ZXing fallback (iOS Safari, and as backup)
  try {
    if(st()) st().textContent="טוען סורק...";
    await loadZXing();
    if(!document.getElementById("bcvid")){ stopScanner(); return; }
    _zxReader=new window.ZXing.BrowserMultiFormatReader();
    if(st()) st().textContent="כוון את המצלמה אל הברקוד...";
    const onResult=(result,err)=>{
      if(result){ const txt=result.getText(); stopScanner(); lookupBarcode(txt); }
    };
    if(typeof _zxReader.decodeFromConstraints==="function"){
      await _zxReader.decodeFromConstraints({video:{facingMode:"environment"}}, "bcvid", onResult);
    } else {
      await _zxReader.decodeFromVideoDevice(undefined, "bcvid", onResult);
    }
  } catch(e){
    if(st()) st().textContent="אין גישה למצלמה — הזן ברקוד ידנית למטה";
  }
}
function stopScanner(){

}
// Shared community barcode database (Supabase) — products one user enters help everyone.
async function sharedBarcodeGet(code){

  try{
    const { data } = await sb.from('barcodes').select('name,emoji,cal,protein,carbs,fat').eq('code',code).maybeSingle();
    if(data && data.cal!=null) return [data.name, data.emoji||"📦", +data.cal, +data.protein||0, +data.carbs||0, +data.fat||0];
  }catch(e){}

}
function sharedBarcodePut(code,f){

  try{ sb.from('barcodes').upsert({ code, name:f[0], emoji:f[1]||"📦",
    cal:+f[2]||0, protein:+f[3]||0, carbs:+f[4]||0, fat:+f[5]||0,
    updated_by:_sbUser.id, updated_at:new Date().toISOString() }).then(()=>{},()=>{}); }catch(e){}
}
async function lookupBarcode(code){
  code=(code||"").trim().replace(/\D/g,"");
  if(code.length<6){ toast("מספר ברקוד לא תקין"); return; }
  stopScanner();
  // 1) learned products (saved on this device) — instant, works offline
  if(S.barcodes && S.barcodes[code]){
    window._gramTarget={ f:S.barcodes[code], code };
    toast("מוצר מוכר ✓");
    askGrams(S.barcodes[code][0], S.barcodes[code][1]||"📦");
    return;
  }
  document.getElementById("sheet").innerHTML=`<div class="handle"></div>
    <div class="card center"><div class="spin" style="border-color:rgba(106,168,79,.3);border-top-color:var(--green);margin:14px auto 12px"></div>מחפש מוצר ${esc(code)}...</div>`;
  let name="";
  // 2) shared community database (other users' entries)
  const shared=await sharedBarcodeGet(code);
  if(shared){ toast("מוצר מהמאגר המשותף ✓"); saveAndUse(code,shared,true); return; }
  // 3) Open Food Facts (global), then 4) Nutritionix (if key set) — chained
  let res=await offLookup(code);
  if(res&&res.f){ saveAndUse(code,res.f); return; }
  if(res&&res.name) name=res.name;
  let res2=await nixLookup(code);
  if(res2&&res2.f){ saveAndUse(code,res2.f); return; }
  if(res2&&res2.name&&!name) name=res2.name;
  // 5) not found anywhere — enter once (name prefilled if any source had it)
  openNewProduct(code,name);
}
function saveAndUse(code,f,fromShared){
  S.barcodes[code]=f; save();              // cache locally for next time
  if(!fromShared) sharedBarcodePut(code,f); // contribute to the shared DB
  window._gramTarget={ f, code };
  askGrams(f[0], f[1]||"📦");
}
async function offLookup(code){
  try {
    const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,product_name_he,brands,nutriments`);
    const d=await r.json();
    if(d.status!==1 || !d.product) return null;
    const n=d.product.nutriments||{};
    const cal = Math.round(n["energy-kcal_100g"] != null ? n["energy-kcal_100g"] : (n["energy_100g"]||0)/4.184);
    const name=((d.product.product_name_he||d.product.product_name||"")
      + (d.product.brands?` (${d.product.brands.split(",")[0]})`:"")).trim();
    if(!cal) return { name };               // found but no nutrition data
    return { f:[name||("מוצר "+code),"📦",cal,+(n.proteins_100g||0),+(n.carbohydrates_100g||0),+(n.fat_100g||0)] };
  } catch(e){ return null; }
}
async function nixLookup(code){
  if(!S.settings.nixId || !S.settings.nixKey) return null;
  try {
    const r=await fetch(`https://trackapi.nutritionix.com/v2/search/item?upc=${encodeURIComponent(code)}`,{
      headers:{ "x-app-id":S.settings.nixId, "x-app-key":S.settings.nixKey }
    });
    if(!r.ok) return null;
    const d=await r.json();
    const food=d.foods&&d.foods[0]; if(!food) return null;
    const g=food.serving_weight_grams||100;
    const per=(v)=> g? +((+v||0)/g*100).toFixed(1) : (+v||0);   // Nutritionix is per-serving → per 100g
    const name=((food.brand_name?food.brand_name+" ":"")+(food.food_name||"")).trim();
    const cal=Math.round(per(food.nf_calories));
    if(!cal) return name?{name}:null;
    return { f:[name||("מוצר "+code),"📦",cal,per(food.nf_protein),per(food.nf_total_carbohydrate),per(food.nf_total_fat)] };
  } catch(e){ return null; }
}

async function aiFoodSearch(){
  const q=(window._q||"").trim();
  if(!q){ toast("הקלד שם מאכל"); return; }
  if(!aiConfigured()){ toast("צריך מפתח/גשר AI בהגדרות"); closeSheet(); go('settings'); return; }

  try{
    const prompt=`אתה מומחה תזונה. החזר ערכים תזונתיים ל-100 גרם של המאכל: "${q}".
החזר JSON תקין בלבד, ללא טקסט מסביב, במבנה המדויק:
{"name":"שם תקני בעברית","emoji":"אימוג'י אחד מתאים","cal":0,"protein":0,"carbs":0,"fat":0}
כל הערכים הם לכל 100 גרם. אם זה מאכל מורכב או מנה, תן הערכה ממוצעת סבירה.`;
    const headers={ "content-type":"application/json","x-api-key":curKey(),
      "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" };
    const body={ model:S.settings.model||"claude-opus-4-8", max_tokens:300,
      messages:[{role:"user",content:[{type:"text",text:prompt}]}] };
    const r=await fetch(aiEndpoint(),{method:"POST",headers,body:JSON.stringify(body)});
    if(!r.ok){ let b=""; try{b=await r.text();}catch(_){} throw new Error("שגיאה "+r.status+(b?": "+b.slice(0,200):"")); }
    const data=await r.json();
    if(data.stop_reason==="refusal") throw new Error("הבקשה נדחתה");
    const txt=(data.content.find(b=>b.type==="text")||{}).text||"{}";
    const o=parseLooseJSON(txt);
    if(o.cal==null) throw new Error("לא התקבלה הערכה");
    const f=[o.name||q, o.emoji||"🍽️", Math.round(+o.cal||0),
      +(+o.protein||0).toFixed(1), +(+o.carbs||0).toFixed(1), +(+o.fat||0).toFixed(1)];
    window._gramTarget={ type:"ai", f };
    askGrams(f[0], f[1]);
  }catch(e){ toast("חיפוש AI נכשל: "+(e.message||e)); renderAddSheet(); }

// Learn from every entry: remember the typical portion weight and the "real product" macros.
// learnedMacros=true marks an explicit user correction (manual/edit) that AI/DB can never overwrite.
function rememberFood(it, learnedMacros){
  if(!it || !it.name) return;
  const key=String(it.name).trim(); if(!key) return;
  S.recents = S.recents || {};
  const ex = S.recents[key] || {};
  let per100 = it.per100 || ex.per100 || null;
  let macroSrc = ex.macroSrc;
  if(learnedMacros && it.per100){ per100 = it.per100; macroSrc = "user"; }   // user correction wins
  else if(ex.macroSrc==="user" && ex.per100){ per100 = ex.per100; }          // protect a prior correction
  const g = (+it.grams||0) || ex.grams || 0;
  let cal=+it.calories||0, protein=+it.protein||0, carbs=+it.carbs||0, fat=+it.fat||0;
  if(per100 && g){ const r=g/100;   // keep absolute values consistent with the (corrected) per100
    cal=Math.round((+per100.cal||0)*r); protein=+(((+per100.protein||0)*r)).toFixed(1);
    carbs=+(((+per100.carbs||0)*r)).toFixed(1); fat=+(((+per100.fat||0)*r)).toFixed(1); }
  S.recents[key] = { name:key, emoji:it.emoji||ex.emoji||"🍽️", per100, macroSrc,
    grams:g, cal, protein, carbs, fat, count:(ex.count||0)+1, last:Date.now(), pin:ex.pin||false };
}
// Override AI-recognised items with the user's previously-corrected macros ("the real product").
function applyLearning(items){
  (items||[]).forEach(i=>{
    const L=(S.recents||{})[String(i.name||"").trim()];
    if(L && L.macroSrc==="user" && L.per100 && +L.per100.cal){
      i.per100={...L.per100}; i.learned=true; aiRecalc(i);   // keep AI's weight, fix the macros
    }
  });
}
function aiRecalc(i){
  const g=Math.max(0,+i.grams||0), r=g/100, p=i.per100||{};
  i.calories=Math.round((+p.cal||0)*r);
  i.protein=+(((+p.protein||0)*r)).toFixed(1);
  i.carbs=+(((+p.carbs||0)*r)).toFixed(1);
  i.fat=+(((+p.fat||0)*r)).toFixed(1);
}

function downscale(file){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      const max=1024; let {width:w,height:h}=img;
      const s=Math.min(1,max/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s);
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      const data=c.toDataURL("image/jpeg",0.82);
      res({ b64:data.split(",")[1], media:"image/jpeg" });
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error("לא ניתן לטעון את התמונה")); };
    img.src=url;
  });
}
const FOOD_SCHEMA = {
  type:"object", additionalProperties:false,
  properties:{
    items:{ type:"array", items:{
      type:"object", additionalProperties:false,
      properties:{
        name:{type:"string"}, emoji:{type:"string"},
        per100:{ type:"object", additionalProperties:false,
          properties:{ cal:{type:"number"}, protein:{type:"number"}, carbs:{type:"number"}, fat:{type:"number"} },
          required:["cal","protein","carbs","fat"] },
        count:{type:"number"},          // visible discrete pieces (0 if not countable) — model reasons before weight
        basis:{type:"string"},          // short explanation of how grams was derived
        grams:{type:"number"}, calories:{type:"number"},
        protein:{type:"number"}, carbs:{type:"number"}, fat:{type:"number"},
        confidence:{type:"string", enum:["high","medium","low"]}
      },
      required:["name","emoji","per100","count","basis","grams","calories","protein","carbs","fat","confidence"]
    }},
    note:{type:"string"}
  },
  required:["items","note"]
};
async function analyzeFood(photos, note){
  let prompt = `אתה תזונאי מומחה המנתח תמונת אוכל. זהה כל מאכל נפרד, ולכל אחד מלא את השדות לפי הסדר — חשוב לנמק לפני שאתה קובע משקל:

- name: שם בעברית. emoji: אימוג'י מתאים.
- per100: ערכים תזונתיים תקניים ל-100 גרם של המאכל (cal, protein, carbs, fat). אלה נתונים ידועים — דייק בהם.
- count: אם המאכל ניתן לספירה (פנה, ניוקי, קציצות, נאגטס, פרוסות, אגוזים, תותים וכו') — ספור את מספר החתיכות הנראות בתמונה. אם לא ניתן לספירה (אורז, פירה, רוטב) — החזר 0.
- basis: משפט קצר שמסביר איך חישבת את המשקל. אם ספרת — הראה את החשבון, למשל "כ-12 חתיכות פנה מבושל × ~4 גר' לחתיכה ≈ 50 גר'". אם לא ספרת — ציין לפי מה אמדת (עצם ייחוס בתמונה: מזלג ~19 ס"מ, כף ~17 ס"מ, צלחת ~27 ס"מ, יד; או "אין עצם ייחוס").
- grams: משקל המנה בפועל לפי החישוב ב-basis. כללי זהב: (1) אם ספרת חתיכות — חשב מהספירה, אל תנחש "מנה סטנדרטית". (2) הטעות הנפוצה היא להניח מנה רגילה כשבפועל הכמות קטנה — היה שמרן ונטה כלפי מטה. (3) אל תנפח.
- calories, protein, carbs, fat: per100 כפול grams חלקי 100.
- confidence: ודאות זיהוי המאכל בלבד (לא המשקל): high אם ברור מהו, medium אם סביר, low אם לא בטוח.

בשדה note כתוב משפט קצר, וציין שכדאי לשקול את המנה ולתקן את המשקל לדיוק מרבי. אם אין אוכל בתמונה, החזר items ריק.`;
  if(photos.length>1) prompt += `\n\nשים לב: צורפו ${photos.length} תמונות של אותה ארוחה (זוויות שונות או מרכיבים נפרדים). שלב את כולן לרשימת פריטים אחת, ואם אותו מאכל מופיע בכמה תמונות אל תספור אותו פעמיים.`;
  if(note && note.trim()) prompt += `\n\nתיאור מהמשתמש — מידע אמין, השתמש בו לזיהוי ולכמויות: "${note.trim()}"`;
  // JSON contract — appended ONLY on the plain fallback, so the structured path stays identical to the known-good request
  const jsonContract = `\n\nהחזר JSON תקין בלבד, ללא טקסט מסביב, במבנה המדויק:
{"items":[{"name":"","emoji":"","per100":{"cal":0,"protein":0,"carbs":0,"fat":0},"count":0,"basis":"","grams":0,"calories":0,"protein":0,"carbs":0,"fat":0,"confidence":"high"}],"note":""}`;
  const imgs = photos.map(p=>({type:"image",source:{type:"base64",media_type:p.media,data:p.b64}}));
  const headers={ "content-type":"application/json", "x-api-key":curKey(),
    "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" };
  const call=(structured)=>{
    const text = structured ? prompt : prompt + jsonContract;
    const body={ model:S.settings.model||"claude-opus-4-8", max_tokens:1500,
      messages:[{role:"user",content:[...imgs,{type:"text",text}]}] };
    if(structured) body.output_config={format:{type:"json_schema",schema:FOOD_SCHEMA}};
    return fetch(aiEndpoint(),{ method:"POST", headers, body:JSON.stringify(body) });
  };
  let resp = await call(true);
  if(!resp.ok && resp.status>=500) resp = await call(false);   // fallback: bridge may not support output_config
  if(!resp.ok){
    let body=""; try{ body=await resp.text(); }catch(_){}
    let m=`שגיאה ${resp.status} מהשרת`;
    try{ const e=JSON.parse(body); if(e.error&&e.error.message) m+=`: ${e.error.message}`; else if(body) m+=`: ${body.slice(0,300)}`; }
    catch(_){ if(body) m+=`: ${body.slice(0,300)}`; }
    throw new Error(m);
  }
  const data=await resp.json();
  if(data.stop_reason==="refusal") throw new Error("הבקשה נדחתה. נסה תמונה אחרת.");
  const txt=(data.content.find(b=>b.type==="text")||{}).text||"{}";
  const parsed=parseLooseJSON(txt);
  if(!parsed.items||!parsed.items.length) throw new Error(parsed.note||"לא זוהה אוכל בתמונה");
  return parsed;
}
function parseLooseJSON(s){
  try { return JSON.parse(s); } catch(_){}
  const a=s.indexOf("{"), b=s.lastIndexOf("}");          // tolerate prose around the JSON
  if(a>=0 && b>a){ try { return JSON.parse(s.slice(a,b+1)); } catch(_){} }
  return {};
}

function weightChart(ws,goal){
  if(ws.length<2) return `<div class="empty">צריך לפחות 2 שקילות כדי להציג גרף</div>`;
  const W=520,H=160,pad=24;
  const xs=ws.map((w,i)=>i), kgs=ws.map(w=>w.kg);
  const allK=kgs.concat([goal]);
  let min=Math.min(...allK), max=Math.max(...allK); if(min===max){min-=1;max+=1;}
  const px=i=> pad + i*(W-2*pad)/(ws.length-1);
  const py=k=> pad + (max-k)*(H-2*pad)/(max-min);
  const pts=ws.map((w,i)=>`${px(i)},${py(w.kg)}`).join(" ");
  const gy=py(goal);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <line x1="${pad}" y1="${gy}" x2="${W-pad}" y2="${gy}" stroke="var(--orange)" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="${W-pad}" y="${gy-5}" fill="var(--orange)" font-size="11" text-anchor="end">יעד ${goal}</text>
    <polyline points="${pts}" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${ws.map((w,i)=>`<circle cx="${px(i)}" cy="${py(w.kg)}" r="3.5" fill="var(--green)"/>`).join("")}
    <text x="${px(0)}" y="${H-6}" fill="var(--muted)" font-size="10" text-anchor="middle">${fmtDate(ws[0].date)}</text>
    <text x="${px(ws.length-1)}" y="${H-6}" fill="var(--muted)" font-size="10" text-anchor="middle">${fmtDate(ws[ws.length-1].date)}</text>
  </svg>`;
}

      <div class="${_bridgeKey?'':'muted '}sm" style="margin:0 0 8px;color:${_bridgeKey?'var(--green)':'inherit'}">${_bridgeKey?'✓ מחובר לגשר ה-AI דרך הענן — זיהוי מתמונה פעיל':(_sbUser?'טוען מפתח גשר...':'🔒 התחבר לסנכרון הענן כדי להפעיל זיהוי AI (המפתח נשלף מהענן, לא שמור בקוד)')}</div>
      <p class="sub" style="margin:0 0 4px">אפשר גם להזין מפתח Anthropic API פרטי משלך (נשמר רק במכשיר). אחרת המערכת משתמשת בגשר המשותף.</p>
      <label>מפתח API (אופציונלי)</label>
      <input id="apikey" type="password" placeholder="sk-ant-..." value="${esc(S.settings.apiKey||'')}">
      <label>כתובת שרת מותאמת (אופציונלי)</label>
      <input id="apiurl" type="url" inputmode="url" placeholder="https://api.anthropic.com" value="${esc(S.settings.apiUrl||'')}">
      <p class="xs muted" style="margin:4px 0 0">להשארה ריק = שרת Anthropic הרשמי. למשתמשי גשר/פרוקסי: הזן את כתובת ה־HTTPS (האפליקציה תוסיף <code>/v1/messages</code> לבד). הגשר חייב להחזיר כותרות CORS ולקבל פורמט Anthropic.</p>
      <label>מודל</label>
      <select id="model">
        <option value="claude-opus-4-8" ${S.settings.model==='claude-opus-4-8'?'selected':''}>Claude Opus 4.8 (מומלץ — מדויק)</option>
        <option value="claude-sonnet-4-6" ${S.settings.model==='claude-sonnet-4-6'?'selected':''}>Claude Sonnet 4.6 (מהיר וזול יותר)</option>
      </select>
      <button class="btn" style="margin-top:12px" onclick="saveKey()">שמור</button>
      <button class="btn sec" style="margin-top:8px" onclick="testConn()">🔌 בדוק חיבור ל-AI</button>
      <div id="conntest" class="xs" style="margin-top:8px;white-space:pre-wrap;word-break:break-word"></div>
      <p class="xs muted" style="margin-top:10px">מפתח אפשר להפיק ב־console.anthropic.com. הקריאה ל־API מתבצעת ישירות מהדפדפן — מתאים לשימוש אישי.</p>
    </div>

    <h2>סריקת ברקוד — מקור שני (Nutritionix)</h2>
    <div class="card">
      <p class="sub" style="margin:0 0 4px">מוצר שלא נמצא ב־Open Food Facts ייבדק גם מול Nutritionix. דורש מפתח חינמי מ־<b>developer.nutritionix.com</b> (App ID + App Key).</p>
      <label>App ID</label>
      <input id="nixid" value="${esc(S.settings.nixId||'')}" placeholder="x-app-id">
      <label>App Key</label>
      <input id="nixkey" type="password" value="${esc(S.settings.nixKey||'')}" placeholder="x-app-key">
      <button class="btn" style="margin-top:12px" onclick="saveKey()">שמור</button>
      <p class="xs muted" style="margin-top:10px">משאירים ריק = חיפוש מול Open Food Facts בלבד. מחזק בעיקר מוצרים בינלאומיים/מותגים.</p>
    </div>

    <h2>תצוגה ונתונים</h2>
    <div class="card">
      <div class="row between" style="padding:6px 0"><span class="b">מצב כהה</span>
        <button class="chip ${S.settings.dark?'on':''}" onclick="toggleDark()">${S.settings.dark?'פעיל':'כבוי'}</button></div>
      <div class="row" style="gap:10px;margin-top:10px">
        <button class="btn sec grow" onclick="exportData()">⬇️ ייצוא גיבוי</button>
        <button class="btn sec grow" onclick="importData()">⬆️ ייבוא</button>
      </div>
      <button class="btn danger" style="margin-top:10px" onclick="resetAll()">🗑️ איפוס כל הנתונים</button>
    </div>
    <a class="btn sec" href="../index.html" style="text-decoration:none">⌂ חזרה לכל האפליקציות</a>
    <p class="center xs muted" style="margin:16px 0 24px">תזונה חכמה · נבנה עם Claude · נתונים נשמרים מקומית בלבד</p>`;
}
function saveKey(){
  S.settings.apiKey=document.getElementById("apikey").value.trim();
  S.settings.apiUrl=document.getElementById("apiurl").value.trim();
  S.settings.model=document.getElementById("model").value;
  const nid=document.getElementById("nixid"), nk=document.getElementById("nixkey");
  if(nid) S.settings.nixId=nid.value.trim();
  if(nk) S.settings.nixKey=nk.value.trim();
  save(); toast("נשמר ✓");
}
async function testConn(){
  // First persist whatever is in the fields, then probe the bridge in escalating steps.
  saveKey();
  const out=document.getElementById("conntest"); if(!out) return;
  const head={ "content-type":"application/json","x-api-key":curKey(),
    "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" };
  const model=S.settings.model||"claude-opus-4-8";
  // a 1x1 transparent PNG — minimal valid image input
  const PX="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M8AAAMBAQDJ/pLvAAAAAElFTkSuQmCC";
  const probes=[
    ["1. טקסט בלבד", { model, max_tokens:16, messages:[{role:"user",content:"ענה במילה אחת: OK"}] }],
    ["2. טקסט + פלט מובנה", { model, max_tokens:64, messages:[{role:"user",content:'החזר JSON: {"ok":true}'}],
      output_config:{format:{type:"json_schema",schema:{type:"object",additionalProperties:false,properties:{ok:{type:"boolean"}},required:["ok"]}}} }],
    ["3. תמונה זעירה", { model, max_tokens:16, messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:"image/png",data:PX}},{type:"text",text:"ענה: OK"}]}] }],
  ];
  out.textContent="בודק...";
  let log="";
  for(const [label,body] of probes){
    try{
      const r=await fetch(aiEndpoint(),{method:"POST",headers:head,body:JSON.stringify(body)});
      const t=await r.text();
      log += `${r.ok?"✅":"❌"} ${label} — ${r.status}\n`;
      if(!r.ok){ log += `   ${t.slice(0,200)}\n`; out.textContent=log; break; }   // stop at first failure
    }catch(e){ log += `❌ ${label} — ${e.message||e}\n`; out.textContent=log; break; }
    out.textContent=log;
  }
}
function editProfile(){ window._ob={...S.profile}; S.profile=null; save(); render(); window.scrollTo(0,0); }
function resetAll(){
  if(confirm("למחוק את כל הנתונים? פעולה זו אינה הפיכה.")){
    localStorage.removeItem(KEY); S=JSON.parse(JSON.stringify(DEFAULT)); render();
  }
}
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="food-tracker-backup-"+todayISO()+".json"; a.click();
}
function importData(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept="application/json";
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{ try{
      const d=JSON.parse(r.result); S=Object.assign({},DEFAULT,d,{tab:"home",viewDate:todayISO()});
      save(); render(); toast("יובא בהצלחה ✓");
    }catch(e){ toast("קובץ לא תקין"); } }; r.readAsText(f);
  }; inp.click();
}

/* ---------- sheet utils ---------- */
function openSheet(){ document.getElementById("scrim").classList.add("open"); }
function closeSheet(){ stopScanner(); document.getElementById("scrim").classList.remove("open"); window._aiResult=null; window._aiBusy=false; window._photos=[]; window._photoNote=""; }
document.getElementById("scrim").addEventListener("click",e=>{ if(e.target.id==="scrim") closeSheet(); });

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ---------- boot ---------- */
window.go=go; window.ob=ob; window.finishOnboard=finishOnboard;
if(S.profile) S.targets=computeTargets(S.profile); // refresh targets (adds water goal for older saves)
render();
cloudInit(); // restore session + pull cloud backup if previously logged in
</script>
