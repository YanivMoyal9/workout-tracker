<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#E7E5E0" />
<title>מערכת אימון A/B</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<style>
  html, body { margin: 0; padding: 0; background: #E7E5E0; }
  #root { min-height: 100vh; }

  /* ===== Dark Mode (filter-based, keeps colored accents readable) ===== */
  html.wt-dark { background: #14130F; }

  /* Equipment catalog */

  .wt-eq-form { display: flex; flex-direction: column; gap: 9px; margin-bottom: 18px; }

  .wt-eq-imgwrap { position: relative; flex: 0 0 auto; }

  .wt-eq-input { width: 100%; box-sizing: border-box; padding: 11px 12px; border-radius: 10px;
    border: 1px solid #CFCDC8; background: #fff; color: #2F3033; font-size: 14px; font-family: inherit; }
  html.wt-dark .wt-eq-input { background: #2B2C30; border-color: #44464B; color: #E9E9EC; }
  #wt-equipment .wt-chip.primary { width: 100%; padding: 12px; margin-top: 2px; }
  .wt-eq-list { display: flex; flex-direction: column; gap: 10px; }
  .wt-eq-card { display: flex; align-items: stretch; gap: 11px; background: rgba(255,255,255,.7);
    border-radius: 14px; padding: 10px; }
  html.wt-dark .wt-eq-card { background: rgba(255,255,255,.06); }
  .wt-eq-img { width: 84px; height: 84px; border-radius: 10px; object-fit: cover; flex: 0 0 auto; background: #E6E4DF; }
  .wt-eq-noimg { display: flex; align-items: center; justify-content: center; font-size: 30px; }
  .wt-eq-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; padding-top: 2px; }
  .wt-eq-name { font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .wt-eq-tag { font-size: 11px; font-weight: 700; color: #2F7A3D; background: rgba(47,122,61,.12);
    padding: 2px 8px; border-radius: 999px; }
  .wt-eq-set { font-size: 13px; color: #444; }
  html.wt-dark .wt-eq-set { color: #C7C9CE; }
  .wt-eq-notes { font-size: 12px; color: #8A8D92; }
  .wt-eq-del { background: none; border: none; cursor: pointer; font-size: 17px; align-self: flex-start;
    opacity: .55; padding: 4px; }

  /* Machine chip inside the workout + popup */
  .wt-mchip { display: inline-flex; align-items: center; gap: 4px; margin: 6px 0 2px; cursor: pointer;
    font-size: 12px; font-weight: 700; color: #2F7A3D; background: rgba(47,122,61,.12);
    padding: 4px 10px; border-radius: 999px; -webkit-user-select: none; user-select: none; }
  .wt-mchip:active { opacity: .7; }
  .wt-winject { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin: 4px 0 2px; }
  .wt-sub-banner { display: inline-flex; align-items: center; font-size: 12.5px; font-weight: 700;

  .wt-sub-banner.skip { color: #6F7277; background: rgba(124,127,133,.15); text-decoration: line-through; }
  html.wt-dark .wt-sub-banner { color: #F0B868; }
  /* Substitution config screen */
  .wt-subs-body { width: 100%; max-width: 460px; padding: 0 16px 32px; box-sizing: border-box; }
  .wt-subs-help { font-size: 13px; color: #6F7277; margin: 4px 0 14px; line-height: 1.5; }
  html.wt-dark .wt-subs-help { color: #A7AAB0; }
  .wt-subs-day { font-size: 15px; font-weight: 800; margin: 16px 0 8px; }
  .wt-sub-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; flex-wrap: wrap; }
  .wt-sub-ex { flex: 0 0 100%; font-size: 13.5px; font-weight: 700; }
  .wt-sub-input { flex: 1 1 60%; box-sizing: border-box; padding: 9px 11px; border-radius: 9px;
    border: 1px solid #CFCDC8; background: #fff; color: #2F3033; font-size: 13.5px; font-family: inherit; }
  html.wt-dark .wt-sub-input { background: #2B2C30; border-color: #44464B; color: #E9E9EC; }
  .wt-sub-skip { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #6F7277; white-space: nowrap; }
  #wt-subs .wt-chip.primary { width: 100%; padding: 12px; margin-top: 16px; }
  #wt-mpop { position: fixed; inset: 0; z-index: 100002; display: none; align-items: center;
    justify-content: center; background: rgba(0,0,0,.45); padding: 18px; box-sizing: border-box; direction: rtl; }
  #wt-mpop.open { display: flex; }
  .wt-mpop-card { width: 100%; max-width: 420px; max-height: 82vh; overflow-y: auto; background: #F4F3F0;
    border-radius: 16px; padding: 14px; box-shadow: 0 16px 50px rgba(0,0,0,.35); }
  html.wt-dark .wt-mpop-card { background: #1F2023; }
  .wt-mpop-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .wt-mpop-head b { font-size: 17px; font-weight: 800; }
  .wt-mpop-x { background: rgba(0,0,0,.08); border: none; width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 16px; color: inherit; }
  html.wt-dark .wt-mpop-x { background: rgba(255,255,255,.12); }
  #wt-mpop-body { display: flex; flex-direction: column; gap: 10px; }
  #wt-mpop-body .wt-eq-name { font-size: 17px; }
  #wt-home { position: fixed; top: calc(10px + env(safe-area-inset-top)); right: 12px; z-index: 99998;
    width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 20px; text-decoration: none; background: rgba(251,250,248,.92); color: #2F3033;
    box-shadow: 0 2px 10px rgba(0,0,0,.18); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); }
  #wt-home:active { transform: scale(.92); }
  html.wt-dark #wt-home { background: #232427; color: #E9E9EC; }
  .wt-row { display: flex; align-items: center; justify-content: space-between;
    margin: 6px 2px; font-size: 14px; }
  .wt-switch { position: relative; width: 42px; height: 24px; }
  .wt-switch input { opacity: 0; width: 0; height: 0; }
  .wt-slider { position: absolute; inset: 0; background: #C9C7C2; border-radius: 24px; transition: .2s; cursor: pointer; }
  .wt-slider:before { content: ""; position: absolute; height: 18px; width: 18px; right: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: .2s; }
  .wt-switch input:checked + .wt-slider { background: #6AA84F; }
  .wt-switch input:checked + .wt-slider:before { transform: translateX(-18px); }
  #wt-toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    background: #2F3033; color: #fff; padding: 10px 16px; border-radius: 10px; font-size: 14px;
    font-family: system-ui, sans-serif; z-index: 100000; opacity: 0; transition: opacity .25s;
    pointer-events: none; direction: rtl; }
  #wt-toast.show { opacity: 1; }

  /* ===== Full-screen overlays (rest timer / personal records) ===== */
  .wt-overlay { position: fixed; inset: 0; z-index: 100001; display: none;
    flex-direction: column; align-items: center; background: rgba(231,229,224,.97);
    color: #2F3033; font-family: system-ui, sans-serif; direction: rtl;
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    animation: wt-fade .2s ease; overflow-y: auto; }
  html.wt-dark .wt-overlay { background: rgba(20,19,15,.97); color: #E9E9EC; }
  .wt-overlay.open { display: flex; }
  @keyframes wt-fade { from { opacity: 0; } to { opacity: 1; } }
  .wt-close { position: absolute; top: 14px; left: 16px; width: 40px; height: 40px;
    border: none; border-radius: 50%; background: rgba(0,0,0,.08); color: inherit;
    font-size: 22px; cursor: pointer; }
  html.wt-dark .wt-close { background: rgba(255,255,255,.12); }
  .wt-overlay h2 { font-size: 19px; margin: 18px 0 4px; font-weight: 800; }

  /* Rest timer */
  #wt-timer { justify-content: center; }
  .wt-ring-wrap { position: relative; width: 240px; height: 240px; margin: 8px 0 20px; }

  .wt-ring-bg { fill: none; stroke: rgba(0,0,0,.10); stroke-width: 14; }
  html.wt-dark .wt-ring-bg { stroke: rgba(255,255,255,.12); }
  .wt-ring-fg { fill: none; stroke: #6AA84F; stroke-width: 14; stroke-linecap: round;

  .wt-ring-fg.over { stroke: #D9744F; }
  .wt-time { position: absolute; inset: 0; display: flex; flex-direction: column;

  .wt-time span { font-size: 14px; color: #7C7F85; margin-top: 4px; }
  .wt-presets, .wt-tcontrols { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  html.wt-dark .wt-chip { background: #34363A; color: #E9E9EC; }
  .wt-chip.primary { background: #2F3033; color: #fff; }
  html.wt-dark .wt-chip.primary { background: #6AA84F; }

  /* Personal records */
  #wt-records .wt-rec-list { width: 100%; max-width: 460px; padding: 0 16px 32px; box-sizing: border-box; }

  html.wt-dark .wt-rec { background: rgba(255,255,255,.06); }

  .wt-rec .sub { font-size: 12px; color: #7C7F85; margin-top: 3px; }
  .wt-rec .orm { font-size: 20px; font-weight: 800; white-space: nowrap; padding-inline-start: 10px; }
  .wt-rec .orm small { font-size: 12px; font-weight: 600; color: #7C7F85; }
  .wt-empty { color: #7C7F85; font-size: 15px; text-align: center; padding: 40px 20px; }
  .wt-rec-main { display: flex; flex-direction: column; gap: 3px; }
  .wt-spark { margin-top: 5px; display: block; }

  /* ===== PR celebration + confetti ===== */
  #wt-celebrate { position: fixed; top: 22%; left: 50%; transform: translateX(-50%) scale(.8);

  #wt-celebrate.show { opacity: 1; transform: translateX(-50%) scale(1); }
  #wt-celebrate b { display: block; font-size: 22px; font-weight: 800; margin-bottom: 4px; }

  @keyframes wt-fall {

  }

  /* ===== Streak / consistency heatmap ===== */
  #wt-streak .wt-streak-body { width: 100%; max-width: 460px; padding: 0 16px 32px; box-sizing: border-box; }

  .wt-stat { background: rgba(255,255,255,.7); border-radius: 12px; padding: 12px 6px; text-align: center; }
  html.wt-dark .wt-stat { background: rgba(255,255,255,.06); }

  html.wt-dark .wt-cell { background: rgba(255,255,255,.10); }

  .wt-heat-legend .wt-cell { width: 13px; height: 13px; }

  /* ===== Modernized bottom navigation bar (overrides the app's inline styles) ===== */
  #root nav {
    background: rgba(251, 250, 248, .82) !important;
    -webkit-backdrop-filter: saturate(160%) blur(14px); backdrop-filter: saturate(160%) blur(14px);
    border-top: 1px solid rgba(0, 0, 0, .04) !important;

  #root nav button:active { transform: scale(.93) !important; }

  #root nav button.wt-active { color: #2F7A3D !important; background: rgba(47, 122, 61, .10) !important; }

  }
</style>
</head>
<body>
<div id="root"><div id="boot">טוען את המערכת…</div></div>

    plank: "פלאנק", crunch: "Crunch", legraise: "הרמות רגליים"

  /* ---------- Cloud sync (Supabase, optional) ----------

  /* ---------- Nutrition (pulled from the food app via a Supabase RPC) ---------- */
  function todayStr() {

    var base = count + " פריטים נאכלו · נמשך מאפליקציית התזונה 🍎";

    fetch(cleanUrl(c.url) + "/rest/v1/rpc/nutrition_today", { method: "POST", headers: sbHeaders(), body: JSON.stringify({ d: todayStr() }) })
      .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(function (d) {
        if (!d || !d.targets) { container.innerHTML = '<div class="wt-empty">לא נמצאו נתוני תזונה.<br>ודא שהרצת את פונקציית nutrition_today ב-Supabase.</div>'; return; }
        var t = d.targets || {}, log = d.log_today || [], water = +d.water_today || 0;

        var calT = +t.cal || 0, calPct = calT > 0 ? Math.min(100, s.calories / calT * 100) : 0;

     We can't hook the minified React handlers, so we intercept writes to
     the session in localStorage and watch the per-exercise "done" counts.
     When one goes up, the user just completed a set -> open the timer. */
  var doneByEx = null; // baseline map, null until first session seen
  function countDone(sessionVal) {
    var map = {};
    try {
      var s = JSON.parse(sessionVal);
      var entries = s && s.entries;
      if (!entries) return null;
      Object.keys(entries).forEach(function (exId) {
        var arr = entries[exId];
        if (!Array.isArray(arr)) return;
        map[exId] = arr.filter(function (x) { return x && x.done; }).length;
      });
      return map;
    } catch (e) { return null; }
  }
  function onSessionWrite(sessionVal) {
    var entries = null;
    try { var s = sessionVal ? JSON.parse(sessionVal) : null; entries = s && s.entries; } catch (e) {}
    if (!entries) { doneByEx = null; prRunningMax = {}; return; } // session ended/cleared
    var map = {};
    Object.keys(entries).forEach(function (exId) {
      var arr = entries[exId];
      if (Array.isArray(arr)) map[exId] = arr.filter(function (x) { return x && x.done; }).length;
    });
    if (doneByEx === null) { doneByEx = map; return; } // first sighting: baseline only
    var bumpedEx = null;
    Object.keys(map).forEach(function (exId) {
      if (map[exId] > (doneByEx[exId] || 0)) bumpedEx = exId;
    });
    doneByEx = map;
    if (!bumpedEx) return;
    if (autoTimerOn) {
      timerOv.classList.add("open");
      startTimer(getRestSec());
    }
    checkPR(bumpedEx, entries[bumpedEx]); // celebrate if this set beats the all-time best
  }
  function installSessionHook() {
    // Poll the session in storage instead of overriding localStorage.setItem,
    // which is unreliable on iOS Safari. When the per-exercise "done" count
    // goes up between polls, the user just completed a set -> open the timer.
    var lastRaw = localStorage.getItem("gym-tracker-session");
    doneByEx = countDone(lastRaw); // seed the baseline so it never fires on load
    setInterval(function () {
      var raw = localStorage.getItem("gym-tracker-session");
      if (raw === lastRaw) return;
      lastRaw = raw;
      try { onSessionWrite(raw); } catch (e) { /* never break the app */ }
    }, 500);
  }

  /* ---------- Highlight the active bottom-nav tab ----------
     The app marks the active tab only via inline text colour (dark vs grey).
     We find the darkest button and tag it with .wt-active so our CSS can give
     it the modern accent pill. A MutationObserver re-runs it on tab changes. */
  function luminance(color) {
    var m = (color || "").match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
    if (!m) return 999;
    return 0.299 * +m[1] + 0.587 * +m[2] + 0.114 * +m[3];
  }
  var navHookT = null;
  function refreshActiveTab() {
    var nav = document.querySelector("#root nav");
    if (!nav) return;
    var btns = nav.querySelectorAll("button");
    if (!btns.length) return;
    var best = null, min = Infinity;
    btns.forEach(function (b) {
      if (b.classList.contains("wt-tools-tab")) return; // our own tab, never "active"
      // Use the app's own inline colour (dark = active), not the computed
      // colour, which our .wt-active accent would otherwise pollute.
      var m = (b.getAttribute("style") || "").match(/color:\s*([^;]+)/);
      var l = luminance(m ? m[1] : "");
      if (l < min) { min = l; best = b; }
    });
    btns.forEach(function (b) {
      if (!b.classList.contains("wt-tools-tab")) b.classList.toggle("wt-active", b === best);
    });
  }

    btn.innerHTML =

      '<line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line>' +
      '<line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line>' +

    var camFile = eqOv.querySelector("#wt-eq-cam-file"), galFile = eqOv.querySelector("#wt-eq-gal-file");
    function onPickPhoto(input) {
      var files = input.files ? Array.prototype.slice.call(input.files) : [];
      input.value = "";
      if (!files.length) return;
      eqStatus("מעבד תמונות…");
      Promise.all(files.map(function (f) { return resizeImage(f, 1000, 0.8); }))
        .then(function (blobs) { blobs.forEach(function (b) { eqPendingBlobs.push(b); }); renderThumbs(); eqStatus(""); })

      };

      var up = blobs.length

      up.then(function (urls) {

      syncOv.querySelector("#wt-sb-code").value = c.code || "";
      sbStatus(sbConfigured() ? "מחובר · " + (sbMeta().at ? "סונכרן לאחרונה " + new Date(sbMeta().at).toLocaleString("he-IL") : "טרם סונכרן") : "לא מחובר");
      var a = aiCfg() || {};
      syncOv.querySelector("#wt-ai-url").value = a.url || "";
      syncOv.querySelector("#wt-ai-key").value = a.key || "";

    syncOv.querySelector("#wt-ai-save").addEventListener("click", function () {
      var url = cleanUrl(syncOv.querySelector("#wt-ai-url").value);
      var key = syncOv.querySelector("#wt-ai-key").value.trim();
      var model = syncOv.querySelector("#wt-ai-model").value.trim() || "claude-opus-4-8";

    });

  /* ---------- PWA: installable manifest (no service worker) ----------
     Earlier versions registered a cache-first service worker that pinned a
